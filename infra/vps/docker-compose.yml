# =============================================================================
# COMENOR — infraestructura del VPS MAW Soluciones
#
# Tres servicios detrás de un único reverse proxy con TLS automático:
#   - minio     almacenamiento S3-compatible (documentos, memorias, eventos)
#   - gotenberg conversión Word/Excel → PDF para el visor de documentos
#   - caddy     reverse proxy; ÚNICO servicio que publica puertos (80/443)
#
# Topología de red:
#   - backend  red INTERNA (sin salida a internet): minio + gotenberg + caddy.
#              minio y gotenberg NO exponen puertos al host — solo Caddy los ve.
#   - frontend red con salida a internet: solo Caddy, necesaria para que ACME
#              (Let's Encrypt) pueda emitir/renovar los certificados.
#
# Los secretos se inyectan por el archivo .env.vps (ver .env.vps.example).
# Arranque:  docker compose --env-file .env.vps up -d
# =============================================================================

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: comenor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Credenciales root del servidor MinIO (superusuario del almacenamiento).
      # NO son las que usa la app: la app usa una llave de servicio con permisos
      # acotados que se crea en el arranque (ver RUNBOOK.md).
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # La consola vive detrás de un túnel SSH, no se publica (ver RUNBOOK.md).
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    volumes:
      - minio-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Sin `ports:` a propósito: MinIO SOLO es accesible por la red interna.
    # El puerto 9000 (S3 API) lo publica Caddy en storage.comenor.org.mx.
    # El puerto 9001 (consola) se alcanza por túnel SSH (ver RUNBOOK.md).

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: comenor-gotenberg
    restart: unless-stopped
    # Endurecimiento: sin API por defecto que no usamos y timeout amplio para
    # conversiones LibreOffice pesadas. Gotenberg NO tiene auth propia; el token
    # lo valida Caddy (ver Caddyfile), por eso este servicio jamás se publica.
    command:
      - "gotenberg"
      - "--libreoffice-disable-routes=false"
      - "--api-timeout=120s"
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    # Sin `ports:`: solo Caddy alcanza a Gotenberg (docs.comenor.org.mx),
    # y únicamente si la petición trae el Bearer token correcto.

  caddy:
    image: caddy:2-alpine
    container_name: comenor-caddy
    restart: unless-stopped
    depends_on:
      - minio
      - gotenberg
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Dominios y token que consume el Caddyfile vía sustitución {$VAR}.
      STORAGE_DOMAIN: ${STORAGE_DOMAIN}
      DOCS_DOMAIN: ${DOCS_DOMAIN}
      GOTENBERG_TOKEN: ${GOTENBERG_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - backend
      - frontend

volumes:
  minio-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
